<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>51ASIC Pixel Office</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0d0d1a; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  min-height: 100vh;
  width: 100vw;
  font-family: monospace;
  overflow: hidden;
  touch-action: manipulation;
  position: fixed;
  top: 0;
  left: 0;
}
canvas { 
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  image-rendering: -moz-crisp-edges;
  image-rendering: -webkit-crisp-edges;
  max-width: 100vw;
  max-height: 100vh;
  border: 1px solid #333;
}
</style>
</head>
<body>
<canvas id="office" width="640" height="480"></canvas>

<script>
// Инициализация Telegram WebApp для полного экрана
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand(); // Развернуть на весь экран
  tg.enableClosingConfirmation(); // Подтверждение закрытия
  
  // Скрыть заголовок если возможно
  if (tg.isVersionAtLeast('6.1')) {
    tg.setHeaderColor('#0d0d1a');
    tg.setBackgroundColor('#0d0d1a');
  }
}

const canvas = document.getElementById('office');
const ctx = canvas.getContext('2d');

// Отключаем сглаживание
ctx.imageSmoothingEnabled = false;
if (ctx.webkitImageSmoothingEnabled !== undefined) ctx.webkitImageSmoothingEnabled = false;
if (ctx.mozImageSmoothingEnabled !== undefined) ctx.mozImageSmoothingEnabled = false;
if (ctx.msImageSmoothingEnabled !== undefined) ctx.msImageSmoothingEnabled = false;

// Масштабирование под экран
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 20, 640);
  const maxH = Math.min(window.innerHeight - 20, 480);
  const scale = Math.min(maxW / 640, maxH / 480);
  
  canvas.style.width = (640 * scale) + 'px';
  canvas.style.height = (480 * scale) + 'px';
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const S = 2;
ctx.scale(S, S);
const W = 320, H = 240;
let frame = 0;

// Палитра
const P = {
  bg: '#0d0d1a',
  wallDark: '#1a1a3a', wallMid: '#252550', wallLight: '#303060', wallAccent: '#3a3a6a',
  floorA: '#3a3a5a', floorB: '#444470',
  deskWood: '#8b6914', deskTop: '#a67c1a', deskLeg: '#6b4c0a',
  monBase: '#222', monFrame: '#333', monScreen: '#00ff88', monOff: '#1a1a2e',
  chairBack: '#2a2a4a', chairSeat: '#3a3a5a',
  skin: '#ffcc99', skinDark: '#e6b280',
  hair: '#2a2a2a', hairLight: '#3a3a3a',
  plantDark: '#1a6b1a', plantMid: '#228b22', plantLight: '#32cd32',
  potDark: '#6b3410', potLight: '#8b4513',
  windowSky: '#4a90d9', windowLight: '#87ceeb',
  curtain: '#4a3060', curtainLight: '#5a4070',
  carpet: '#2a1a4a', carpetBorder: '#3a2a5a', carpetPattern: '#352050',
  gold: '#ffd700', goldDark: '#cc9900',
  white: '#ffffff', black: '#000000',
  cyan: '#3b82f6', cyanLight: '#60a5fa', cyanDark: '#2563eb',
  red: '#ef4444', green: '#22c55e',
  gray: '#888', grayDark: '#555', grayLight: '#aaa',
};

function drawPixel(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// ПОЛ
function drawFloor() {
  for (let y = 40; y < H; y += 8) {
    for (let x = 0; x < W; x += 8) {
      const alt = ((x/8 + y/8) % 2 === 0);
      drawPixel(x, y, 8, 8, alt ? P.floorA : P.floorB);
      if (alt) drawPixel(x, y, 8, 1, '#4a4a6a');
    }
  }
}

// СТЕНЫ
function drawWalls() {
  drawPixel(0, 0, W, 44, P.wallDark);
  drawPixel(0, 30, W, 14, P.wallMid);
  drawPixel(0, 42, W, 2, P.wallLight);
  drawPixel(0, 38, W, 2, P.wallAccent);
}

// ЛОГОТИП 51ASIC
function drawLogo() {
  drawPixel(130, 4, 60, 28, P.gold);
  drawPixel(131, 5, 58, 26, P.wallDark);
  
  ctx.fillStyle = P.cyan;
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('51ASIC', 160, 17);
  
  ctx.fillStyle = P.gold;
  ctx.font = '5px monospace';
  ctx.fillText('MINING CO.', 160, 26);
  
  const glow = Math.sin(frame * 0.05) * 0.3 + 0.5;
  ctx.fillStyle = `rgba(59, 130, 246, ${glow * 0.3})`;
  ctx.fillRect(128, 2, 64, 32);
}

// ОКНА
function drawWindow(x) {
  drawPixel(x-1, 4, 30, 26, P.grayDark);
  drawPixel(x, 5, 28, 24, P.windowSky);
  drawPixel(x, 5, 28, 8, P.windowLight);
  drawPixel(x+13, 5, 2, 24, P.grayDark);
  drawPixel(x, 16, 28, 2, P.grayDark);
  drawPixel(x-3, 3, 4, 28, P.curtain);
  drawPixel(x+27, 3, 4, 28, P.curtain);
  drawPixel(x-2, 3, 2, 28, P.curtainLight);
  drawPixel(x+28, 3, 2, 28, P.curtainLight);
  drawPixel(x-5, 2, 38, 2, P.grayLight);
}

// РАСТЕНИЕ
function drawPlant(x, y) {
  drawPixel(x+2, y+10, 10, 6, P.potDark);
  drawPixel(x+3, y+10, 8, 5, P.potLight);
  drawPixel(x, y+8, 14, 3, P.potDark);
  drawPixel(x+3, y+8, 8, 2, '#3a2a1a');
  drawPixel(x+6, y-2, 2, 12, P.plantDark);
  drawPixel(x+3, y-4, 4, 4, P.plantMid);
  drawPixel(x+7, y-6, 5, 4, P.plantLight);
  drawPixel(x+1, y, 4, 3, P.plantMid);
  drawPixel(x+9, y-2, 4, 3, P.plantLight);
  const sway = Math.sin(frame * 0.03 + x) * 1;
  drawPixel(x+4+sway, y-8, 3, 3, P.plantLight);
  drawPixel(x+8-sway, y-7, 3, 3, P.plantMid);
}

// ЛАМПА
function drawLamp(x, y) {
  drawPixel(x+3, y, 2, 20, P.gray);
  drawPixel(x+1, y+18, 6, 3, P.grayDark);
  drawPixel(x-1, y-4, 10, 5, P.gold);
  drawPixel(x, y-3, 8, 3, P.goldDark);
  const glow = Math.sin(frame * 0.04) * 0.15 + 0.25;
  ctx.fillStyle = `rgba(255, 215, 0, ${glow})`;
  ctx.beginPath();
  ctx.arc(x+4, y+8, 18, 0, Math.PI*2);
  ctx.fill();
}

// СТОЛ С КОМПЬЮТЕРОМ
function drawDesk(x, y, hasAgent, name, shirtCol, hairCol) {
  drawPixel(x+2, y+22, 34, 4, 'rgba(0,0,0,0.3)');
  
  drawPixel(x, y+10, 34, 3, P.deskTop);
  drawPixel(x, y+13, 34, 2, P.deskWood);
  drawPixel(x+1, y+9, 32, 1, '#b88a20');
  drawPixel(x+2, y+15, 3, 8, P.deskLeg);
  drawPixel(x+29, y+15, 3, 8, P.deskLeg);
  
  drawPixel(x+10, y-2, 14, 12, P.monFrame);
  drawPixel(x+11, y-1, 12, 10, hasAgent ? P.monScreen : P.monOff);
  drawPixel(x+15, y+10, 4, 2, P.grayDark);
  drawPixel(x+14, y+10, 6, 1, P.gray);
  
  if (hasAgent) {
    if (name === 'ТРЕНЕР') {
      // Пульс/фитнес для тренера
      for (let i = 0; i < 5; i++) {
        const pulse = Math.abs(Math.sin(frame * 0.15 + i * 1.5)) * 4;
        ctx.fillStyle = 'rgba(239, 68, 68, 0.9)';
        ctx.fillRect(x+12 + i*2, y + 3 - pulse, 1, pulse + 1);
      }
    } else if (name === 'ТРЕЙДЕР') {
      // Торговые графики для трейдера
      for (let i = 0; i < 4; i++) {
        const chartColor = (Math.sin(frame * 0.1 + i) > 0) ? 'rgba(34, 197, 94, 0.8)' : 'rgba(239, 68, 68, 0.8)';
        const chartWidth = 3 + Math.floor(Math.abs(Math.sin(frame * 0.05 + i)) * 4);
        ctx.fillStyle = chartColor;
        ctx.fillRect(x+12 + i*2, y + i*2, chartWidth, 1);
      }
    } else {
      // Обычный код для других агентов
      for (let i = 0; i < 4; i++) {
        const lw = 4 + Math.floor(Math.random() * 6);
        ctx.fillStyle = `rgba(0, 255, 136, ${0.5 + Math.random()*0.5})`;
        ctx.fillRect(x+12, y + i*2, lw, 1);
      }
    }
  }
  
  drawPixel(x+12, y+6, 10, 3, P.grayDark);
  drawPixel(x+13, y+7, 8, 1, P.gray);
  drawPixel(x+24, y+7, 3, 2, P.gray);
  drawPixel(x+3, y+5, 4, 5, '#cc4444');
  drawPixel(x+4, y+6, 2, 3, '#dd6666');
  drawPixel(x+7, y+7, 1, 2, '#cc4444');
  
  drawPixel(x+10, y+24, 14, 2, P.chairBack);
  drawPixel(x+9, y+26, 16, 6, P.chairSeat);
  drawPixel(x+11, y+32, 3, 4, P.grayDark);
  drawPixel(x+20, y+32, 3, 4, P.grayDark);
  
  if (hasAgent) {
    drawCharacter(x+11, y+14, shirtCol || P.cyan, hairCol || P.hair, name);
  }
  
  if (name) {
    const nameW = name.length * 4 + 6;
    const nx = x + 17 - nameW/2;
    drawPixel(nx, y+38, nameW, 9, 'rgba(0,0,0,0.7)');
    drawPixel(nx, y+38, nameW, 1, hasAgent ? P.cyan : P.grayDark);
    ctx.fillStyle = hasAgent ? P.white : P.grayLight;
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(name, x+17, y+45);
  }
}

// ПИКСЕЛЬНЫЙ ПЕРСОНАЖ
function drawCharacter(x, y, shirtColor, hairColor, name) {
  drawPixel(x-1, y+12, 14, 2, 'rgba(0,0,0,0.2)');
  drawPixel(x+2, y+10, 3, 3, P.wallDark);
  drawPixel(x+7, y+10, 3, 3, P.wallDark);
  drawPixel(x+1, y+2, 10, 8, shirtColor);
  drawPixel(x+2, y+2, 8, 1, shirtColor === P.cyan ? P.cyanLight : (shirtColor === P.black ? '#333' : shirtColor));
  drawPixel(x-1, y+3, 2, 6, P.skin);
  drawPixel(x+11, y+3, 2, 6, P.skin);
  drawPixel(x+2, y-6, 8, 8, P.skin);
  drawPixel(x+3, y-5, 6, 6, P.skin);
  
  // Мускулы для тренера
  if (name === 'ТРЕНЕР') {
    drawPixel(x-2, y+3, 3, 5, P.skin); // левый бицепс
    drawPixel(x+11, y+3, 3, 5, P.skin); // правый бицепс
    drawPixel(x-2, y+4, 1, 3, '#e8b89a'); // тень бицепса
    drawPixel(x+13, y+4, 1, 3, '#e8b89a');
    drawPixel(x+1, y+2, 10, 1, '#1d4ed8'); // воротник
  }
  
  // Волосы
  if (name === 'ТРЕНЕР') {
    // Красная кепка
    drawPixel(x, y-9, 12, 3, '#cc2222'); // основа кепки
    drawPixel(x-1, y-7, 14, 1, '#cc2222'); // козырёк
    drawPixel(x-2, y-6, 2, 1, '#aa1111'); // тень козырька
    drawPixel(x+5, y-9, 3, 1, '#ff4444'); // блик на кепке
  } else if (name === 'ТРЕЙДЕР') {
    // Длинные седые волосы
    drawPixel(x+1, y-8, 10, 3, hairColor); // основа
    drawPixel(x, y-7, 1, 6, hairColor); // левая сторона
    drawPixel(x+11, y-7, 1, 6, hairColor); // правая сторона
    drawPixel(x-1, y-5, 1, 4, hairColor); // ещё длиннее слева
    drawPixel(x+12, y-5, 1, 4, hairColor); // ещё длиннее справа
  } else {
    // Обычные волосы
    drawPixel(x+2, y-8, 8, 3, hairColor);
    drawPixel(x+1, y-7, 1, 4, hairColor);
    drawPixel(x+10, y-7, 1, 4, hairColor);
  }
  
  // Глаза
  drawPixel(x+4, y-3, 2, 2, P.black);
  drawPixel(x+7, y-3, 2, 2, P.black);
  
  // Очки для тренера
  if (name === 'ТРЕНЕР') {
    // Чёрные спортивные очки (широкие)
    drawPixel(x+2, y-4, 4, 3, P.black); // левая линза
    drawPixel(x+7, y-4, 4, 3, P.black); // правая линза
    drawPixel(x+3, y-3, 2, 1, '#1a1a2e'); // блик левой
    drawPixel(x+8, y-3, 2, 1, '#1a1a2e'); // блик правой
    drawPixel(x+6, y-3, 1, 1, P.black); // перемычка
  }
  // Очки для трейдера
  else if (name === 'ТРЕЙДЕР') {
    // Чёрные круглые очки
    drawPixel(x+3, y-4, 3, 3, P.black); // левая линза
    drawPixel(x+8, y-4, 3, 3, P.black); // правая линза
    drawPixel(x+4, y-3, 1, 1, '#222'); // блик левой линзы
    drawPixel(x+9, y-3, 1, 1, '#222'); // блик правой линзы
    drawPixel(x+6, y-3, 2, 1, P.black); // перемычка
    // Дужки очков
    drawPixel(x+2, y-3, 1, 1, P.black); // левая дужка
    drawPixel(x+11, y-3, 1, 1, P.black); // правая дужка
  } else {
    // Обычные глаза
    drawPixel(x+4, y-3, 1, 1, P.white);
    drawPixel(x+7, y-3, 1, 1, P.white);
  }
  
  drawPixel(x+5, y, 3, 1, '#cc8866');
}

// СТОЛИК С КОФЕМАШИНОЙ
function drawCoffeeStation(x, y) {
  // Столик
  drawPixel(x, y+8, 12, 8, P.deskWood);
  drawPixel(x+1, y+7, 10, 1, P.deskTop);
  drawPixel(x+1, y+16, 3, 4, P.deskLeg);
  drawPixel(x+8, y+16, 3, 4, P.deskLeg);
  
  // Кофемашина
  drawPixel(x+2, y-2, 8, 10, P.grayDark);
  drawPixel(x+3, y-1, 6, 8, P.gray);
  drawPixel(x+4, y, 4, 2, P.black); // экран
  drawPixel(x+5, y+3, 2, 1, P.red); // кнопка
  drawPixel(x+7, y+3, 2, 1, P.green); // кнопка
  
  // Носик для кофе
  drawPixel(x+8, y+5, 3, 2, P.grayLight);
  
  // Кружки
  drawPixel(x+1, y+6, 2, 2, P.white); // белая кружка
  drawPixel(x+9, y+6, 2, 2, P.cyan); // голубая кружка
  
  // Пар (анимированный)
  const steam = Math.sin(frame * 0.08) * 0.3 + 0.5;
  ctx.fillStyle = `rgba(255, 255, 255, ${steam * 0.4})`;
  ctx.fillRect((x+5) * 2, (y-4) * 2, 2, 1);
  ctx.fillRect((x+6) * 2, (y-5) * 2, 2, 1);
}

// ДОСКА НА СТЕНЕ
function drawBoard(x) {
  drawPixel(x, 6, 28, 22, P.white);
  drawPixel(x+1, 7, 26, 20, '#f0f0f0');
  drawPixel(x, 6, 28, 1, P.grayDark);
  drawPixel(x, 27, 28, 1, P.grayDark);
  drawPixel(x, 6, 1, 22, P.grayDark);
  drawPixel(x+27, 6, 1, 22, P.grayDark);
  drawPixel(x+3, 10, 10, 1, P.cyan);
  drawPixel(x+3, 13, 14, 1, P.red);
  drawPixel(x+3, 16, 8, 1, P.green);
  drawPixel(x+3, 19, 12, 1, P.cyan);
  drawPixel(x+3, 22, 6, 1, P.gold);
  drawPixel(x+18, 10, 6, 6, '#ffeb3b');
  drawPixel(x+20, 18, 5, 5, '#ff9800');
}

// ОСНОВНОЙ РЕНДЕР
function render() {
  drawPixel(0, 0, W, H, P.bg);
  
  drawFloor();
  drawWalls();
  
  drawWindow(20);
  drawWindow(260);
  
  drawLogo();
  drawBoard(70);
  
  drawPixel(40, 55, 240, 140, P.carpet);
  drawPixel(42, 57, 236, 136, P.carpetBorder);
  drawPixel(44, 59, 232, 132, P.carpet);
  for (let i = 0; i < 10; i++) {
    drawPixel(60 + i*22, 80, 12, 1, P.carpetPattern);
    drawPixel(60 + i*22, 150, 12, 1, P.carpetPattern);
  }
  
  drawPlant(6, 50);
  drawPlant(298, 50);
  drawPlant(298, 130);
  drawPlant(6, 180);
  
  drawLamp(100, 44);
  drawLamp(210, 44);
  
  drawCoffeeStation(290, 85);
  
  // Рабочие места
  drawDesk(50, 65, true, 'ДЖОННИ', P.black, '#ff6600'); // чёрная футболка, рыжие волосы
  drawDesk(130, 65, true, 'ТРЕЙДЕР', P.red, '#cccccc'); // красная футболка, седые волосы
  drawDesk(210, 65, false, 'СВОБОДНО', null, null);
  
  drawDesk(50, 140, false, 'СВОБОДНО', null, null);
  drawDesk(130, 140, false, 'СВОБОДНО', null, null);
  drawDesk(210, 140, true, 'ТРЕНЕР', '#2563eb', '#cc2222'); // синяя футболка, красная кепка
  
  // Статусная панель
  drawPixel(0, H-18, W, 18, 'rgba(13,13,26,0.9)');
  drawPixel(0, H-18, W, 1, P.cyan);
  ctx.fillStyle = P.cyan;
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('🏢 51ASIC PIXEL OFFICE', 6, H-7);
  ctx.textAlign = 'right';
  ctx.fillStyle = P.green;
  ctx.fillText('● ONLINE', W-6, H-7);
  ctx.textAlign = 'left';
  
  ctx.fillStyle = P.grayLight;
  ctx.font = '6px monospace';
  ctx.fillText('Агенты: 2/6', 140, H-7);
  
  // Модальные окна поверх всего
  drawModal();
  drawJohnnyModal();
  drawTrainerModal();
  
  frame++;
  requestAnimationFrame(render);
}

// Модальное окно
let modalOpen = false;
let balanceData = null;

// Загружаем баланс
async function loadBalance() {
  try {
    const r = await fetch('balance.json?t=' + Date.now());
    balanceData = await r.json();
  } catch(e) {
    balanceData = {status: 'offline', totalUSD: 0, balances: {}, prices: {}, updated: 'нет данных'};
  }
}
loadBalance();
setInterval(loadBalance, 60000);

// Данные Джонни
let johnnyData = null;
let johnnyModalOpen = false;
let trainerModalOpen = false;

async function loadJohnny() {
  try {
    const r = await fetch('johnny.json?t=' + Date.now());
    johnnyData = await r.json();
  } catch(e) {
    johnnyData = {status: 'offline', model: 'unknown', tasks: [], updated: 'нет данных'};
  }
}
loadJohnny();
setInterval(loadJohnny, 60000);

// Рисуем модальное окно
function drawModal() {
  if (!modalOpen || !balanceData) return;
  
  const mx = 20, my = 5, mw = 280, mh = 233;
  
  // Фон
  drawPixel(0, 0, W, H, 'rgba(0,0,0,0.7)');
  drawPixel(mx, my, mw, mh, '#0d0d2a');
  drawPixel(mx, my, mw, 2, P.cyan);
  drawPixel(mx, my+mh-2, mw, 2, P.cyan);
  drawPixel(mx, my, 2, mh, P.cyan);
  drawPixel(mx+mw-2, my, 2, mh, P.cyan);
  
  // Заголовок
  ctx.fillStyle = P.cyan;
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('📊 ТРЕЙДЕР — MEXC', W/2, my+14);
  
  // Статус
  ctx.fillStyle = balanceData.status === 'online' ? P.green : P.red;
  ctx.font = '6px monospace';
  ctx.fillText((balanceData.status === 'online' ? '● ONLINE' : '● OFFLINE'), W/2, my+24);
  
  // Баланс
  ctx.fillStyle = P.gold;
  ctx.font = 'bold 11px monospace';
  ctx.fillText('$' + (balanceData.totalUSD || 0).toFixed(2) + ' USDT', W/2, my+40);
  
  ctx.fillStyle = P.grayLight;
  ctx.font = '5px monospace';
  ctx.fillText('Общий баланс всей криптовалюты', W/2, my+48);
  
  // Активы
  ctx.textAlign = 'left';
  ctx.fillStyle = P.white;
  ctx.font = '6px monospace';
  let yOff = my + 60;
  
  if (balanceData.balances) {
    const assets = Object.entries(balanceData.balances);
    for (let i = 0; i < Math.min(assets.length, 5); i++) {
      const [asset, amount] = assets[i];
      const displayAmt = amount > 1000000 ? (amount/1000000).toFixed(1) + 'M' : 
                          amount > 1000 ? (amount/1000).toFixed(1) + 'K' : 
                          amount.toFixed(4);
      ctx.fillStyle = P.grayLight;
      ctx.fillText(asset + ':', mx+10, yOff);
      ctx.fillStyle = P.white;
      ctx.fillText(displayAmt, mx+50, yOff);
      yOff += 10;
    }
  }
  
  // Цены
  yOff += 3;
  ctx.fillStyle = P.cyan;
  ctx.font = '6px monospace';
  ctx.fillText('Рынок:', mx+10, yOff);
  yOff += 8;
  
  if (balanceData.prices) {
    for (const [sym, data] of Object.entries(balanceData.prices)) {
      const name = sym.replace('USDT', '');
      const changeColor = data.change >= 0 ? P.green : P.red;
      const arrow = data.change >= 0 ? '▲' : '▼';
      ctx.fillStyle = P.grayLight;
      ctx.fillText(name, mx+10, yOff);

  const rect = canvas.getBoundingClientRect();
  const scaleX = 640 / rect.width;
  const scaleY = 480 / rect.height;
  return {
    x: (cx - rect.left) * scaleX / S,
    y: (cy - rect.top) * scaleY / S
  };
}

function isJohnnyClick(cx, cy) {
  const {x, y} = getClickCoords(cx, cy);
  return x >= 40 && x <= 95 && y >= 50 && y <= 115;
}

function isTraderClick(cx, cy) {
  const {x, y} = getClickCoords(cx, cy);
  return x >= 120 && x <= 175 && y >= 50 && y <= 115;
}

function isTrainerClick(cx, cy) {
  const {x, y} = getClickCoords(cx, cy);
  return x >= 200 && x <= 255 && y >= 125 && y <= 195;
}

// === PINCH-TO-ZOOM ===
let zoomLevel = 1;
let zoomTarget = 1;
let panX = 0, panY = 0;
let panTargetX = 0, panTargetY = 0;
let isPinching = false;
let lastPinchDist = 0;
let lastTouchX = 0, lastTouchY = 0;
let touchStartX = 0, touchStartY = 0;
let isSingleTouch = false;
let touchStartTime = 0;
const MIN_ZOOM = 1;
const MAX_ZOOM = 3;

function getPinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function getPinchCenter(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2
  };
}

function clampPan() {
  if (zoomTarget <= 1) {
    panTargetX = 0;
    panTargetY = 0;
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const maxPanX = rect.width * (zoomTarget - 1) / 2;
  const maxPanY = rect.height * (zoomTarget - 1) / 2;
  panTargetX = Math.max(-maxPanX, Math.min(maxPanX, panTargetX));
  panTargetY = Math.max(-maxPanY, Math.min(maxPanY, panTargetY));
}

function applyZoom() {
  // Плавная анимация зума
  zoomLevel += (zoomTarget - zoomLevel) * 0.15;
  panX += (panTargetX - panX) * 0.15;
  panY += (panTargetY - panY) * 0.15;
  
  canvas.style.transform = `scale(${zoomLevel}) translate(${panX / zoomLevel}px, ${panY / zoomLevel}px)`;
  canvas.style.transformOrigin = 'center center';
  
  if (Math.abs(zoomTarget - zoomLevel) > 0.001 || Math.abs(panTargetX - panX) > 0.1) {
    requestAnimationFrame(applyZoom);
  }
}

// Touch обработчики
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    // Pinch начался
    e.preventDefault();
    isPinching = true;
    isSingleTouch = false;
    lastPinchDist = getPinchDist(e.touches);
  } else if (e.touches.length === 1) {
    isSingleTouch = true;
    touchStartTime = Date.now();
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    
    // Если зумнуты — начинаем пан
    if (zoomTarget > 1.05) {
      e.preventDefault();
    }
  }
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && isPinching) {
    e.preventDefault();
    const dist = getPinchDist(e.touches);
    const scale = dist / lastPinchDist;
    
    zoomTarget = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomTarget * scale));
    lastPinchDist = dist;
    
    clampPan();
    requestAnimationFrame(applyZoom);
  } else if (e.touches.length === 1 && zoomTarget > 1.05 && !isPinching) {
    // Пан при зуме
    e.preventDefault();
    const dx = e.touches[0].clientX - lastTouchX;
    const dy = e.touches[0].clientY - lastTouchY;
    panTargetX += dx;
    panTargetY += dy;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    
    clampPan();
    requestAnimationFrame(applyZoom);
    isSingleTouch = false;
  }
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) {
    isPinching = false;
  }
  
  // Если это был быстрый тап (не пан и не зум) — обработать как клик
  if (isSingleTouch && !isPinching && (Date.now() - touchStartTime) < 300) {
    const touch = e.changedTouches[0];
    // Проверяем что палец не сильно сдвинулся (иначе это пан)
    const dx = Math.abs(touch.clientX - touchStartX);
    const dy = Math.abs(touch.clientY - touchStartY);
    
    if (dx < 10 && dy < 10) {
      if (modalOpen || johnnyModalOpen || trainerModalOpen) {
        // Закрываем модалку
        modalOpen = false;
        johnnyModalOpen = false;
        trainerModalOpen = false;
      } else if (isTraderClick(touch.clientX, touch.clientY)) {
        modalOpen = true;
        loadBalance();
      } else if (isJohnnyClick(touch.clientX, touch.clientY)) {
        johnnyModalOpen = true;
        loadJohnny();
      } else if (isTrainerClick(touch.clientX, touch.clientY)) {
        trainerModalOpen = true;
      }
      // Предотвращаем повторную обработку
      e.preventDefault();
      // Проверяем двойной тап для зума
      handleTap(touch);
    }
  }
  
  isSingleTouch = false;
  
  // Если зум меньше 1.05 — сбросить
  if (zoomTarget < 1.05) {
    zoomTarget = 1;
    panTargetX = 0;
    panTargetY = 0;
    requestAnimationFrame(applyZoom);
  }
});

// Двойной тап для зума — встроен в основной touchend
// Чтобы не конфликтовать с одиночным тапом, используем таймер
let lastTapTime = 0;
let tapTimeout = null;

function handleTap(touch) {
  const now = Date.now();
  
  if (now - lastTapTime < 300) {
    // Двойной тап — toggle zoom (только если модалки закрыты)
    clearTimeout(tapTimeout);
    if (!modalOpen && !johnnyModalOpen && !trainerModalOpen) {
      if (zoomTarget > 1.05) {
        zoomTarget = 1;
        panTargetX = 0;
        panTargetY = 0;
      } else {
        zoomTarget = 2;
      }
      requestAnimationFrame(applyZoom);
    }
    lastTapTime = 0; // сброс, чтобы тройной тап не сработал
  } else {
    lastTapTime = now;
  }
}

// Запуск
render();
