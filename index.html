<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51ASIC Pixel Office</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #333;
            max-width: 100%;
            height: auto;
        }
        #modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="pixelOffice" width="600" height="400"></canvas>
    
    <div id="modal">
        <div class="modal-content">
            <h2 id="modalName"></h2>
            <p id="modalRole"></p>
            <p id="modalStats"></p>
            <button onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pixelOffice');
        const ctx = canvas.getContext('2d');

        // Agent data
        const agents = [
            { 
                name: 'Джонни', 
                role: 'Координатор', 
                color: 'black', 
                hairColor: '#FF6B00', 
                x: 50, 
                y: 50,
                stats: 'Координация проектов: 95%\nОпыт работы: 15 лет'
            },
            { 
                name: 'Леха', 
                role: 'Специалист', 
                color: 'red', 
                hairColor: 'black', 
                x: 200, 
                y: 50,
                stats: 'Технические навыки: 90%\nРешение сложных задач: 88%'
            },
            { 
                name: 'Донни', 
                role: 'Эксперт', 
                color: '#8B4513', 
                hairColor: 'black', 
                x: 350, 
                y: 50,
                stats: 'Экспертиза: 98%\nАналитические навыки: 92%'
            },
            { 
                name: 'Майкл', 
                role: 'Аналитик', 
                color: 'blue', 
                hairColor: 'gray', 
                x: 50, 
                y: 250,
                stats: 'Точность прогнозов: 85%\nГлубина анализа: 93%'
            },
            { 
                name: 'Евгения', 
                role: 'Менеджер', 
                color: 'pink', 
                hairColor: 'black', 
                x: 200, 
                y: 250,
                stats: 'Управление проектами: 87%\nКоммуникативность: 95%'
            },
            { 
                name: 'Трейдер', 
                role: 'Финансист', 
                color: 'green', 
                hairColor: 'gray', 
                x: 350, 
                y: 250,
                stats: 'Успешность сделок: 82%\nРиск-менеджмент: 90%'
            }
        ];

        // Draw pixel person function
        function drawPixelPerson(x, y, hairColor, shirtColor) {
            // Head
            ctx.fillStyle = '#FFC78E';
            ctx.fillRect(x + 10, y, 20, 20);

            // Hair
            ctx.fillStyle = hairColor;
            ctx.fillRect(x + 10, y, 20, 10);

            // Eyes
            ctx.fillStyle = 'black';
            ctx.fillRect(x + 13, y + 5, 4, 4);
            ctx.fillRect(x + 23, y + 5, 4, 4);

            // Body
            ctx.fillStyle = shirtColor;
            ctx.fillRect(x + 10, y + 20, 20, 30);

            // Legs
            ctx.fillStyle = '#4A4A4A';
            ctx.fillRect(x + 10, y + 50, 20, 20);
        }

        // Draw office
        function drawOffice() {
            // Clear canvas
            ctx.fillStyle = '#F0F0F0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Title
            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText('51ASIC PIXEL OFFICE', 200, 30);

            // Status
            ctx.font = '15px Arial';
            ctx.fillText('Агенты: 6/6', 250, canvas.height - 50);
            ctx.fillText('ONLINE', 270, canvas.height - 30);

            // Draw agents
            agents.forEach(agent => {
                drawPixelPerson(agent.x, agent.y, agent.hairColor, agent.color);
            });
        }

        // Show modal
        function showModal(agent) {
            const modal = document.getElementById('modal');
            const nameEl = document.getElementById('modalName');
            const roleEl = document.getElementById('modalRole');
            const statsEl = document.getElementById('modalStats');

            nameEl.textContent = agent.name;
            roleEl.textContent = `Роль: ${agent.role}`;
            statsEl.textContent = `Статистика:\n${agent.stats}`;

            modal.style.display = 'flex';
        }

        // Close modal
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';
        }

        // Initial draw
        drawOffice();

        // Click handling
        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            agents.forEach(agent => {
                if (x >= agent.x && x <= agent.x + 40 && 
                    y >= agent.y && y <= agent.y + 70) {
                    showModal(agent);
                }
            });
        });
    </script>
</body>
</html>
