<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51ASIC Pixel Office</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
            user-select: none;
            overflow: hidden;
            height: 100vh;
        }
        
        .office {
            width: 100vw;
            height: 100vh;
            background-image: 
                linear-gradient(90deg, #16213e 1px, transparent 1px),
                linear-gradient(180deg, #16213e 1px, transparent 1px);
            background-size: 40px 40px;
            position: relative;
            cursor: crosshair;
        }
        
        .agent {
            position: absolute;
            width: 60px;
            height: 80px;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }
        
        .agent:hover {
            transform: scale(1.1);
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            margin: 0 auto 5px;
            image-rendering: pixelated;
            border: 2px solid #0ff;
            border-radius: 50%;
        }
        
        .name {
            text-align: center;
            font-size: 10px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }
        
        .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin: 2px auto;
        }
        
        .online { background: #0f0; }
        .busy { background: #ff0; }
        .away { background: #f80; }
        
        .furniture {
            position: absolute;
            image-rendering: pixelated;
        }
        
        .desk {
            width: 80px;
            height: 60px;
            background: linear-gradient(45deg, #8B4513 25%, #A0522D 25%, #A0522D 50%, #8B4513 50%);
            background-size: 8px 8px;
            border: 2px solid #654321;
        }
        
        .computer {
            width: 30px;
            height: 20px;
            background: #333;
            border: 1px solid #555;
            margin: 10px auto;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #0ff;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        
        .modal h2 {
            color: #0ff;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px #000;
        }
        
        .modal p {
            color: #fff;
            margin: 10px 0;
            line-height: 1.6;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat {
            background: rgba(0, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #0ff;
        }
        
        .stat-label {
            color: #0ff;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .stat-value {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .trading-panel {
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #0ff;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .position {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
        }
        
        .green { color: #0f0; }
        .red { color: #f44; }
        
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1001;
        }
        
        @media (max-width: 600px) {
            .stats {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 20px;
                margin: 20px;
            }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
        }
    </style>
</head>
<body>

        <div class="agent" style="top: 420px; left: 160px;" onclick="showModal('developer')">

            <div class="name">ДЕВЕЛОПЕР</div>
            <div class="status online"></div>

    </div>
    
    <!-- Modal -->

        <div class="modal-content" id="modalContent">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="modalBody"></div>

    </div>

        function showModal(agent) {
            const data = agentData[agent];
            if (!data) return;
            
            // Vibrate if supported
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            
            // Haptic feedback for Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
            
            const statsHtml = Object.entries(data.stats).map(([key, value]) => 
                `<div class="stat">
                    <div class="stat-label">${key}</div>
                    <div class="stat-value">${value}</div>
                </div>`
            ).join('');
            
            document.getElementById('modalBody').innerHTML = `
                <h2>${data.title}</h2>
                <p>${data.description}</p>
                <div class="stats">${statsHtml}</div>
                ${data.special || ''}
            `;
            
            document.getElementById('modal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        // Close modal on background click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // Handle escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
        
        // Random office activity simulation
        function simulateActivity() {
            const agents = document.querySelectorAll('.agent');
            agents.forEach(agent => {
                if (Math.random() < 0.1) { // 10% chance
                    agent.style.filter = 'brightness(1.3)';
                    setTimeout(() => {
                        agent.style.filter = 'brightness(1)';
                    }, 500);
                }
            });
        }
        
        setInterval(simulateActivity, 3000);
        
        // Update trader stats periodically
        function updateTraderStats() {
            const trader = agentData.trader;
            const baseProfit = 2847.50;
            const variation = (Math.random() - 0.5) * 100; // ±$50
            trader.stats["Общий P&L"] = `+$${(baseProfit + variation).toFixed(2)}`;
        }
        
        setInterval(updateTraderStats, 10000); // Update every 10 seconds
    </script>
