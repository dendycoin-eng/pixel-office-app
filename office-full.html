<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>51ASIC Pixel Office</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #f0f0f0;
            overflow: hidden;
            touch-action: none;
            overscroll-behavior: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #00FFFF;
            flex-direction: column;
            font-size: 18px;
        }
        #loading-progress {
            width: 200px;
            height: 10px;
            background-color: #333;
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }
        #loading-progress-bar {
            width: 0;
            height: 100%;
            background-color: #00FFFF;
            transition: width 0.5s ease;
        }
        #fallback-message {
            display: none;
            text-align: center;
            color: red;
            padding: 20px;
        }
        /* Other styles from previous code remain the same */
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <h2>Загрузка офиса...</h2>
        <div id="loading-progress">
            <div id="loading-progress-bar"></div>
        </div>
    </div>

    <!-- Fallback Message -->
    <div id="fallback-message">
        <h2>Ошибка загрузки</h2>
        <p>К сожалению, не удалось загрузить офис. Пожалуйста, обновите страницу или проверьте совместимость браузера.</p>
    </div>

    <canvas id="officeCanvas"></canvas>
    <div id="modal">
        <div id="modal-content"></div>
    </div>

    <script>
    // Telegram WebApp integration
    function initTelegramWebApp() {
        if (window.Telegram && window.Telegram.WebApp) {
            const WebApp = window.Telegram.WebApp;
            WebApp.ready();
            WebApp.expand();
            
            // Set Telegram theme colors
            document.body.style.backgroundColor = WebApp.backgroundColor || '#f0f0f0';
        }
    }

    class OfficeScene {
        constructor() {
            this.canvas = document.getElementById('officeCanvas');
            this.ctx = null;
            this.modal = document.getElementById('modal');
            this.modalContent = document.getElementById('modal-content');
            this.loadingOverlay = document.getElementById('loading-overlay');
            this.loadingProgressBar = document.getElementById('loading-progress-bar');
            this.fallbackMessage = document.getElementById('fallback-message');
            
            this.initializeScene();
        }
        
        async initializeScene() {
            try {
                // Simulate loading progress
                this.updateLoadingProgress(20);
                
                // Check for Canvas support
                if (!this.canvas.getContext) {
                    throw new Error('Canvas not supported');
                }
                
                this.ctx = this.canvas.getContext('2d');
                
                // More loading simulation
                this.updateLoadingProgress(50);
                
                // Ensure canvas works
                this.setupCanvas();
                
                // More loading simulation
                this.updateLoadingProgress(80);
                
                this.setupEventListeners();
                
                // Initialize Telegram WebApp
                initTelegramWebApp();
                
                // Finalize loading
                this.updateLoadingProgress(100);
                this.loadingOverlay.style.display = 'none';
                
                // Draw office after a short delay to ensure everything is ready
                setTimeout(() => {
                    this.drawOffice();
                }, 100);
                
            } catch (error) {
                console.error('Scene initialization error:', error);
                this.showFallbackMessage();
            }
        }
        
        updateLoadingProgress(percentage) {
            this.loadingProgressBar.style.width = `${percentage}%`;
        }
        
        showFallbackMessage() {
            this.loadingOverlay.style.display = 'none';
            this.fallbackMessage.style.display = 'block';
            console.error('Failed to initialize office scene');
        }
        
        setupCanvas() {
            // Ensure high-DPI canvas scaling
            const dpr = window.devicePixelRatio || 1;
            const rect = this.canvas.getBoundingClientRect();
            
            this.canvas.width = rect.width * dpr;
            this.canvas.height = rect.height * dpr;
            
            // Scale canvas back to CSS pixels
            this.canvas.style.width = `${rect.width}px`;
            this.canvas.style.height = `${rect.height}px`;
            
            // Scale drawing context
            this.ctx.scale(dpr, dpr);
            
            // Fallback render check
            try {
                this.drawOffice();
            } catch (error) {
                console.error('Office drawing error:', error);
                this.showFallbackMessage();
            }
        }
        
        setupEventListeners() {
            // Prevent overscroll and zooming
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            // Resize with debounce
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => this.setupCanvas(), 250);
            });
            
            this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
            this.modal.addEventListener('click', (e) => {
                if (e.target === this.modal) this.closeModal();
            });
        }
        
        // Rest of the methods (drawOffice, drawWindows, drawFurniture, drawEmployees, 
        // drawDecorations, handleCanvasClick, showEmployeeModal, closeModal) 
        // remain exactly the same as in the previous implementation
        
        // ... [Previous implementation of these methods copied here] ...
    }

    // Ensure the scene is loaded after DOM is fully ready
    document.addEventListener('DOMContentLoaded', () => {
        const officeScene = new OfficeScene();
        // Expose to global scope for modal close button
        window.officeScene = officeScene;
    });
    </script>
</body>
</html>
