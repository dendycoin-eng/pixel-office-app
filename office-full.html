<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>51ASIC Office - Pixel Edition v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-scale: 4px;
            --primary-bg: #f4f4f4;
            --secondary-bg: #e0e0e0;
            --accent-color: #6a4caf;
            --shadow-color: rgba(0,0,0,0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body, html {
            height: 100%;
            background-color: var(--primary-bg);
            overflow: hidden;
            touch-action: manipulation;
        }

        .office-container {
            display: grid;
            grid-template-columns: 1fr;
            max-width: 100vw;
            height: 100vh;
            padding: 10px;
            gap: 10px;
            background-color: var(--primary-bg);
            position: relative;
            overflow: hidden;
        }

        .pixel-border {
            border: calc(var(--pixel-scale) * 2) solid #333;
            border-radius: calc(var(--pixel-scale) * 3);
            position: relative;
        }

        .office-interior {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 5px;
            height: 100%;
            position: relative;
        }

        .window {
            grid-column: 1 / span 4;
            grid-row: 1 / span 3;
            background: linear-gradient(135deg, #87CEEB 0%, #4682B4 100%);
            border: calc(var(--pixel-scale) * 2) solid #555;
            position: relative;
            overflow: hidden;
        }

        .window::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            width: 80%;
            height: 2px;
            background-color: rgba(255,255,255,0.3);
        }

        .curtain {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, #8B4513, #D2691E);
            opacity: 0.7;
            transform: translateX(-50%);
            transition: transform 0.3s ease;
        }

        .window:hover .curtain {
            transform: translateX(0);
        }

        .whiteboard {
            grid-column: 9 / span 4;
            grid-row: 1 / span 3;
            background-color: white;
            border: calc(var(--pixel-scale) * 2) solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .whiteboard-content {
            width: 90%;
            height: 90%;
            background: repeating-linear-gradient(
                #f0f0f0 0px,
                #f0f0f0 20px,
                #ddd 20px,
                #ddd 21px
            );
        }

        .water-cooler {
            grid-column: 5 / span 2;
            grid-row: 1 / span 2;
            background-color: #4682B4;
            border: calc(var(--pixel-scale) * 2) solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .water-cooler::before {
            content: '💧';
            font-size: 24px;
        }

        .carpet {
            grid-column: 1 / span 12;
            grid-row: 8 / span 3;
            background: linear-gradient(45deg, #6a4caf, #8e24aa);
            border: calc(var(--pixel-scale) * 2) solid #333;
            opacity: 0.8;
        }

        .logo {
            grid-column: 11 / span 2;
            grid-row: 4 / span 2;
            background-color: white;
            border: calc(var(--pixel-scale) * 2) solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        .logo::before {
            content: '51ASIC';
            color: #333;
        }

        .plant {
            grid-column: 7 / span 2;
            grid-row: 1 / span 2;
            background-color: #2E8B57;
            border: calc(var(--pixel-scale) * 2) solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plant::before {
            content: '🌿';
            font-size: 24px;
        }

        .lamp {
            grid-column: 5 / span 1;
            grid-row: 4 / span 1;
            background-color: #FFA500;
            border-radius: 50%;
            animation: lamp-glow 2s infinite alternate;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes lamp-glow {
            from { box-shadow: 0 0 5px #FFA500; }
            to { box-shadow: 0 0 20px #FFA500; }
        }

        .lamp::before {
            content: '💡';
            font-size: 24px;
        }

        .agent {
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: calc(var(--pixel-scale) * 2) solid #333;
        }

        .agent:hover {
            transform: scale(1.05);
        }

        .agent-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background-color: white;
            border: calc(var(--pixel-scale) * 3) solid #333;
            border-radius: 10px;
            z-index: 1000;
            width: 80%;
            max-width: 500px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .agent-modal.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .agent-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .agent-overlay.active {
            display: block;
        }

        #jonny {
            grid-column: 1 / span 2;
            grid-row: 5 / span 2;
            background-color: #FF6B6B;
        }

        #jonny::before {
            content: '🤖';
            font-size: 24px;
        }

        #lekha {
            grid-column: 3 / span 2;
            grid-row: 5 / span 2;
            background-color: #4ECDC4;
        }

        #lekha::before {
            content: '👨‍🦱';
            font-size: 24px;
        }

        #donnie {
            grid-column: 5 / span 2;
            grid-row: 5 / span 2;
            background-color: #45B7D1;
        }

        #donnie::before {
            content: '👴';
            font-size: 24px;
        }

        #michael {
            grid-column: 7 / span 2;
            grid-row: 5 / span 2;
            background-color: #FDCB6E;
        }

        #michael::before {
            content: '👨‍💼';
            font-size: 24px;
        }

        #evgenia {
            grid-column: 9 / span 2;
            grid-row: 5 / span 2;
            background-color: #6C5CE7;
        }

        #evgenia::before {
            content: '👩‍💼';
            font-size: 24px;
        }

        #trader {
            grid-column: 11 / span 2;
            grid-row: 5 / span 2;
            background-color: #A8E6CF;
        }

        #trader::before {
            content: '📈';
            font-size: 24px;
        }

        @media (max-width: 768px) {
            .office-interior {
                grid-template-columns: repeat(6, 1fr);
                grid-template-rows: repeat(20, 1fr);
            }

            .window { grid-column: 1 / span 6; grid-row: 1 / span 3; }
            .whiteboard { grid-column: 1 / span 6; grid-row: 4 / span 3; }
            .water-cooler { grid-column: 1 / span 3; grid-row: 7 / span 2; }
            .plant { grid-column: 4 / span 3; grid-row: 7 / span 2; }
            .logo { grid-column: 1 / span 6; grid-row: 9 / span 2; }
            .lamp { grid-column: 1 / span 6; grid-row: 11 / span 1; }
            .carpet { grid-column: 1 / span 6; grid-row: 17 / span 4; }

            .agent { grid-column: span 3; }
            #jonny { grid-column: 1 / span 3; grid-row: 12 / span 2; }
            #lekha { grid-column: 4 / span 3; grid-row: 12 / span 2; }
            #donnie { grid-column: 1 / span 3; grid-row: 14 / span 2; }
            #michael { grid-column: 4 / span 3; grid-row: 14 / span 2; }
            #evgenia { grid-column: 1 / span 3; grid-row: 16 / span 2; }
            #trader { grid-column: 4 / span 3; grid-row: 16 / span 2; }
        }
    </style>
</head>
<body>
    <div class="office-container">
        <div class="office-interior pixel-border">
            <div class="window pixel-border">
                <div class="curtain"></div>
            </div>
            <div class="whiteboard pixel-border">
                <div class="whiteboard-content"></div>
            </div>
            <div class="water-cooler pixel-border"></div>
            <div class="plant pixel-border"></div>
            <div class="logo pixel-border"></div>
            <div class="lamp pixel-border"></div>
            <div class="carpet pixel-border"></div>

            <div id="jonny" class="agent" data-name="Джонни" data-role="Координатор" data-description="Рыжие волосы, чёрная футболка"></div>
            <div id="lekha" class="agent" data-name="Леха" data-role="Специалист" data-description="Кучерявые чёрные волосы, красная футболка"></div>
            <div id="donnie" class="agent" data-name="Донни" data-role="Эксперт" data-description="Чёрные волосы, белые очки, коричневая футболка"></div>
            <div id="michael" class="agent" data-name="Майкл" data-role="Аналитик" data-description="Серые волосы, синяя футболка"></div>
            <div id="evgenia" class="agent" data-name="Евгения" data-role="Менеджер" data-description="Чёрные волосы, белые очки, розовая футболка"></div>
            <div id="trader" class="agent" data-name="Трейдер" data-role="Финансист" data-description="Седые волосы, чёрные очки, зелёная рубашка"></div>
        </div>
    </div>

    <div class="agent-overlay"></div>
    <div id="agent-modal" class="agent-modal">
        <h2 id="agent-name">Имя</h2>
        <p id="agent-role">Роль</p>
        <p id="agent-description">Описание</p>
        <button id="close-modal">Закрыть</button>
    </div>

    <script>
        // Telegram WebApp initialization
        window.Telegram = {
            WebApp: {
                ready: function() {
                    this.expand();
                    this.enableClosingConfirmation();
                },
                expand: function() {},
                close: function() {},
                enableClosingConfirmation: function() {}
            }
        };

        // Modal functionality
        document.addEventListener('DOMContentLoaded', () => {
            const agents = document.querySelectorAll('.agent');
            const overlay = document.querySelector('.agent-overlay');
            const modal = document.getElementById('agent-modal');
            const closeModal = document.getElementById('close-modal');

            agents.forEach(agent => {
                agent.addEventListener('click', () => {
                    const name = agent.dataset.name;
                    const role = agent.dataset.role;
                    const description = agent.dataset.description;

                    document.getElementById('agent-name').textContent = name;
                    document.getElementById('agent-role').textContent = role;
                    document.getElementById('agent-description').textContent = description;

                    modal.classList.add('active');
                    overlay.classList.add('active');
                });
            });

            closeModal.addEventListener('click', () => {
                modal.classList.remove('active');
                overlay.classList.remove('active');
            });

            overlay.addEventListener('click', () => {
                modal.classList.remove('active');
                overlay.classList.remove('active');
            });

            // Telegram WebApp init
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
            }
        });
    </script>
</body>
</html>
