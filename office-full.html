<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51ASIC Pixel Office</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #f0f0f0;
            overflow: hidden;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100vh;
        }
        #modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        #modal-content {
            background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
            color: #00FFFF;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,255,255,0.2);
            position: relative;
            border: 2px solid #00FFFF;
        }
        #modal-content h2 {
            margin-top: 0;
            color: #00FFFF;
            font-size: 2rem;
            border-bottom: 2px solid #00FFFF;
            padding-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            text-align: left;
        }
        .stats-grid strong {
            color: white;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #00FFFF;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .close-btn:hover {
            transform: rotate(90deg);
        }
        .status-tag {
            display: inline-block;
            background-color: #00FFFF;
            color: #121212;
            padding: 5px 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="officeCanvas"></canvas>
    <div id="modal">
        <div id="modal-content"></div>
    </div>

    <script>
    class OfficeScene {
        constructor() {
            this.canvas = document.getElementById('officeCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.modal = document.getElementById('modal');
            this.modalContent = document.getElementById('modal-content');
            
            this.setupCanvas();
            this.setupEventListeners();
            
            this.officeColors = {
                background: '#f0f0f0',
                black: '#000000',
                white: '#FFFFFF', 
                cyan: '#00FFFF'
            };
            
            this.employees = [
                { 
                    name: 'ДЖОННИ', 
                    color: '#FFA500', 
                    role: 'Координатор', 
                    shirt: 'оранжевая рубашка', 
                    x: 0, 
                    y: 0,
                    stats: {
                        experience: '15 лет',
                        tasksProcessed: '1,247',
                        successRate: '98.5%',
                        currentStatus: 'Координация команды',
                        specialization: 'Управление проектами, планирование'
                    }
                },
                { 
                    name: 'ЛЕХА', 
                    color: '#FF0000', 
                    role: 'Специалист', 
                    shirt: 'красная рубашка', 
                    x: 0, 
                    y: 0,
                    stats: {
                        experience: '8 лет',
                        tasksResolved: '892',
                        successRate: '94.2%',
                        currentStatus: 'Работа с клиентами',
                        specialization: 'Техническая поддержка, диагностика'
                    }
                },
                { 
                    name: 'ДОННИ', 
                    color: '#8B4513', 
                    role: 'Эксперт', 
                    shirt: 'коричневая рубашка', 
                    glasses: true, 
                    x: 0, 
                    y: 0,
                    stats: {
                        experience: '20 лет',
                        consultationCount: '2,156',
                        expertiseAccuracy: '99.1%',
                        currentStatus: 'Анализ рынка',
                        specialization: 'Аналитика, исследования'
                    }
                },
                { 
                    name: 'МАЙКЛ', 
                    color: '#0000FF', 
                    role: 'Аналитик', 
                    shirt: 'синяя рубашка', 
                    x: 0, 
                    y: 0,
                    stats: {
                        experience: '12 лет',
                        reportsCreated: '567',
                        forecastAccuracy: '87.3%',
                        currentStatus: 'Подготовка отчета',
                        specialization: 'Рыночная аналитика'
                    }
                },
                { 
                    name: 'ЕВГЕНИЯ', 
                    color: '#FFC0CB', 
                    role: 'Менеджер', 
                    shirt: 'розовая рубашка', 
                    glasses: true, 
                    x: 0, 
                    y: 0,
                    stats: {
                        experience: '10 лет',
                        projectsManaged: '15',
                        projectSuccessRate: '91.8%',
                        currentStatus: 'Планирование спринта',
                        specialization: 'Управление командой'
                    }
                },
                { 
                    name: 'ТРЕЙДЕР', 
                    color: '#008000', 
                    role: 'Финансист', 
                    shirt: 'зелёная рубашка', 
                    glasses: true, 
                    x: 0, 
                    y: 0,
                    stats: {
                        experience: '7 лет',
                        profitAndLoss: '+$2,847.50',
                        successfulTradesRate: '73.2%',
                        currentStatus: 'Мониторинг рынка',
                        activePositions: 'BTC/USDT, ETH/USDT, SOL/USDT'
                    }
                }
            ];
        }
        
        setupCanvas() {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
            this.drawOffice();
        }
        
        setupEventListeners() {
            window.addEventListener('resize', () => this.setupCanvas());
            this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
            this.modal.addEventListener('click', (e) => {
                if (e.target === this.modal) this.closeModal();
            });
        }
        
        drawOffice() {
            this.ctx.fillStyle = this.officeColors.background;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            
            // Рисуем стены
            this.ctx.fillStyle = this.officeColors.white;
            this.ctx.fillRect(50, 50, this.canvas.width - 100, this.canvas.height - 100);
            
            // Окна
            this.drawWindows();
            
            // Мебель и интерьер
            this.drawFurniture();
            this.drawEmployees();
            this.drawDecorations();
        }
        
        drawWindows() {
            this.ctx.fillStyle = this.officeColors.cyan;
            // Левое окно
            this.ctx.fillRect(100, 100, 200, 300);
            // Правое окно
            this.ctx.fillRect(this.canvas.width - 300, 100, 200, 300);
        }
        
        drawFurniture() {
            // Столы
            const tableWidth = 200;
            const tableHeight = 100;
            const tableSpacingX = this.canvas.width / 4;
            const tableSpacingY = this.canvas.height / 3;
            
            this.ctx.fillStyle = '#8B4513'; // Коричневый цвет столов
            
            // 3x2 расположение столов
            for (let row = 0; row < 2; row++) {
                for (let col = 0; col < 3; col++) {
                    const x = tableSpacingX * (col + 1) - tableWidth / 2;
                    const y = tableSpacingY * (row + 1) - tableHeight / 2;
                    
                    this.ctx.fillRect(x, y, tableWidth, tableHeight);
                    this.employees[row * 3 + col].x = x + tableWidth / 2;
                    this.employees[row * 3 + col].y = y + tableHeight / 2;
                    
                    // Компьютеры на столах
                    this.ctx.fillStyle = this.officeColors.black;
                    this.ctx.fillRect(x + 20, y + 20, 40, 30);
                    this.ctx.fillStyle = '#8B4513';
                }
            }
            
            // Кулер
            this.ctx.fillStyle = this.officeColors.cyan;
            this.ctx.fillRect(this.canvas.width - 200, this.canvas.height - 250, 50, 100);
        }
        
        drawEmployees() {
            this.employees.forEach(emp => {
                // Тело
                this.ctx.fillStyle = emp.color;
                this.ctx.fillRect(emp.x - 20, emp.y - 40, 40, 60);
                
                // Голова
                this.ctx.fillStyle = '#FFD700';
                this.ctx.fillRect(emp.x - 15, emp.y - 70, 30, 30);
                
                // Очки для некоторых
                if (emp.glasses) {
                    this.ctx.fillStyle = this.officeColors.black;
                    this.ctx.fillRect(emp.x - 10, emp.y - 65, 20, 10);
                }
            });
        }
        
        drawDecorations() {
            // Цветы
            this.ctx.fillStyle = 'green';
            const flowerPositions = [
                { x: 100, y: 500 },
                { x: this.canvas.width - 150, y: 500 },
                { x: this.canvas.width / 2, y: 100 }
            ];
            
            flowerPositions.forEach(pos => {
                this.ctx.fillRect(pos.x, pos.y, 30, 50);
            });
            
            // Часы
            this.ctx.fillStyle = this.officeColors.black;
            this.ctx.fillRect(this.canvas.width / 2 - 25, 70, 50, 50);
        }
        
        handleCanvasClick(event) {
            const rect = this.canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            const clickedEmployee = this.employees.find(emp => 
                x >= emp.x - 20 && x <= emp.x + 20 &&
                y >= emp.y - 70 && y <= emp.y + 20
            );
            
            if (clickedEmployee) {
                this.showEmployeeModal(clickedEmployee);
            }
        }
        
        showEmployeeModal(employee) {
            let statsHtml = '';
            const stats = employee.stats;
            
            // Dynamically generate stats based on available information
            Object.keys(stats).forEach(key => {
                let label = '';
                switch(key) {
                    case 'experience': label = 'Опыт работы'; break;
                    case 'tasksProcessed': label = 'Обработано задач'; break;
                    case 'successRate': label = 'Успешность'; break;
                    case 'currentStatus': label = 'Текущий статус'; break;
                    case 'specialization': label = 'Специализация'; break;
                    case 'tasksResolved': label = 'Решённых задач'; break;
                    case 'consultationCount': label = 'Консультаций проведено'; break;
                    case 'expertiseAccuracy': label = 'Точность экспертизы'; break;
                    case 'reportsCreated': label = 'Отчетов создано'; break;
                    case 'forecastAccuracy': label = 'Точность прогнозов'; break;
                    case 'projectsManaged': label = 'Проектов ведет'; break;
                    case 'projectSuccessRate': label = 'Успешность проектов'; break;
                    case 'profitAndLoss': label = 'P&L'; break;
                    case 'successfulTradesRate': label = 'Успешных сделок'; break;
                    case 'activePositions': label = 'Активные позиции'; break;
                    default: label = key;
                }
                
                statsHtml += `<div><strong>${label}:</strong> ${stats[key]}</div>`;
            });
            
            this.modalContent.innerHTML = `
                <button class="close-btn" onclick="officeScene.closeModal()">×</button>
                <h2>${employee.name}</h2>
                <p><strong>Роль:</strong> ${employee.role}</p>
                <p><strong>Одежда:</strong> ${employee.shirt}</p>
                ${employee.glasses ? '<p><strong>Примета:</strong> Носит очки</p>' : ''}
                <div class="stats-grid">
                    ${statsHtml}
                </div>
                <div class="status-tag">${stats.currentStatus}</div>
            `;
            this.modal.style.display = 'flex';
        }
        
        closeModal() {
            this.modal.style.display = 'none';
        }
    }

    const officeScene = new OfficeScene();
    </script>
</body>
</html>
