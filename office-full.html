<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>51ASIC Office - Pixel Edition v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-scale: 4px;
            --primary-bg: #f4f4f4;
            --secondary-bg: #e0e0e0;
            --accent-color: #6a4caf;
            --shadow-color: rgba(0,0,0,0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body, html {
            height: 100%;
            background-color: var(--primary-bg);
            overflow: hidden;
            touch-action: manipulation;
        }

        /* ... [Previous CSS remains the same until .agent section] ... */

        .agent {
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: calc(var(--pixel-scale) * 2) solid #333;
            background-color: transparent;
            overflow: hidden;
        }

        .agent:hover {
            transform: scale(1.05);
        }

        .pixel-person {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .pixel-head {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 25%;
            background-color: #333;
            border: 2px solid #000;
        }

        .pixel-hair {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background-color: transparent;
        }

        .pixel-body {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 40%;
            border: 2px solid #000;
        }

        .pixel-arms {
            position: absolute;
            top: 35%;
            left: 0;
            width: 100%;
            height: 20%;
            display: flex;
            justify-content: space-between;
        }

        .pixel-arm {
            width: 20%;
            height: 100%;
            background-color: #000;
            transform: rotate(10deg);
        }

        .pixel-glasses {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 10%;
            background-color: transparent;
            border: 2px solid white;
            border-radius: 10px;
            z-index: 10;
        }

        /* Specific agent styles */
        #jonny .pixel-body { background-color: black; }
        #jonny .pixel-hair { background-color: #ff6b00; }

        #lekha .pixel-body { background-color: red; }
        #lekha .pixel-hair { 
            background-color: black;
            clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);
            border-radius: 50% 50% 0 0;
        }

        #donnie .pixel-body { background-color: #8B4513; }
        #donnie .pixel-hair { background-color: black; }

        #michael .pixel-body { background-color: blue; }
        #michael .pixel-hair { background-color: #808080; }

        #evgenia .pixel-body { background-color: pink; }
        #evgenia .pixel-hair { background-color: black; }

        #trader .pixel-body { background-color: green; }
        #trader .pixel-hair { background-color: #808080; }

        /* Media queries remain the same as in previous version */
    </style>
</head>
<body>
    <div class="office-container">
        <div class="office-interior pixel-border">
            <!-- [Previous interior elements remain the same] -->

            <div id="jonny" class="agent" data-name="Джонни" data-role="Координатор" data-description="Рыжие волосы, чёрная футболка">
                <div class="pixel-person">
                    <div class="pixel-head"></div>
                    <div class="pixel-hair"></div>
                    <div class="pixel-body"></div>
                    <div class="pixel-arms">
                        <div class="pixel-arm"></div>
                        <div class="pixel-arm"></div>
                    </div>
                </div>
            </div>

            <div id="lekha" class="agent" data-name="Леха" data-role="Специалист" data-description="Кучерявые чёрные волосы, красная футболка">
                <div class="pixel-person">
                    <div class="pixel-head"></div>
                    <div class="pixel-hair"></div>
                    <div class="pixel-body"></div>
                    <div class="pixel-arms">
                        <div class="pixel-arm"></div>
                        <div class="pixel-arm"></div>
                    </div>
                </div>
            </div>

            <div id="donnie" class="agent" data-name="Донни" data-role="Эксперт" data-description="Чёрные волосы, белые очки, коричневая футболка">
                <div class="pixel-person">
                    <div class="pixel-head"></div>
                    <div class="pixel-hair"></div>
                    <div class="pixel-glasses"></div>
                    <div class="pixel-body"></div>
                    <div class="pixel-arms">
                        <div class="pixel-arm"></div>
                        <div class="pixel-arm"></div>
                    </div>
                </div>
            </div>

            <div id="michael" class="agent" data-name="Майкл" data-role="Аналитик" data-description="Серые волосы, синяя футболка">
                <div class="pixel-person">
                    <div class="pixel-head"></div>
                    <div class="pixel-hair"></div>
                    <div class="pixel-body"></div>
                    <div class="pixel-arms">
                        <div class="pixel-arm"></div>
                        <div class="pixel-arm"></div>
                    </div>
                </div>
            </div>

            <div id="evgenia" class="agent" data-name="Евгения" data-role="Менеджер" data-description="Чёрные волосы, белые очки, розовая футболка">
                <div class="pixel-person">
                    <div class="pixel-head"></div>
                    <div class="pixel-hair"></div>
                    <div class="pixel-glasses"></div>
                    <div class="pixel-body"></div>
                    <div class="pixel-arms">
                        <div class="pixel-arm"></div>
                        <div class="pixel-arm"></div>
                    </div>
                </div>
            </div>

            <div id="trader" class="agent" data-name="Трейдер" data-role="Финансист" data-description="Седые волосы, чёрные очки, зелёная рубашка">
                <div class="pixel-person">
                    <div class="pixel-head"></div>
                    <div class="pixel-hair"></div>
                    <div class="pixel-glasses" style="border-color: black;"></div>
                    <div class="pixel-body"></div>
                    <div class="pixel-arms">
                        <div class="pixel-arm"></div>
                        <div class="pixel-arm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- [Previous modal and script sections remain the same] -->
</body>
</html>
