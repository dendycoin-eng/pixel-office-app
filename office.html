<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>51ASIC Pixel Office v2.1</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0d0d1a; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  min-height: 100vh;
  font-family: monospace;
  overflow: hidden;
  touch-action: manipulation;
}
canvas { 
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  image-rendering: -moz-crisp-edges;
  image-rendering: -webkit-crisp-edges;
  max-width: 100vw;
  max-height: 100vh;
  border: 1px solid #333;
}
</style>
</head>
<body>
<canvas id="office" width="640" height="480"></canvas>

<script>
// VERSION 2.1 - UPDATED CHARACTER LOOKS
const VERSION = '2.1.' + Date.now();
console.log('51ASIC Pixel Office', VERSION);

const canvas = document.getElementById('office');
const ctx = canvas.getContext('2d');

// Отключаем сглаживание
ctx.imageSmoothingEnabled = false;
if (ctx.webkitImageSmoothingEnabled !== undefined) ctx.webkitImageSmoothingEnabled = false;
if (ctx.mozImageSmoothingEnabled !== undefined) ctx.mozImageSmoothingEnabled = false;
if (ctx.msImageSmoothingEnabled !== undefined) ctx.msImageSmoothingEnabled = false;

// Масштабирование под экран
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 20, 640);
  const maxH = Math.min(window.innerHeight - 20, 480);
  const scale = Math.min(maxW / 640, maxH / 480);
  
  canvas.style.width = (640 * scale) + 'px';
  canvas.style.height = (480 * scale) + 'px';
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const S = 2;
ctx.scale(S, S);
const W = 320, H = 240;
let frame = 0;

// Палитра
const P = {
  bg: '#0d0d1a',
  wallDark: '#1a1a3a', wallMid: '#252550', wallLight: '#303060', wallAccent: '#3a3a6a',
  floorA: '#3a3a5a', floorB: '#444470',
  deskWood: '#8b6914', deskTop: '#a67c1a', deskLeg: '#6b4c0a',
  monBase: '#222', monFrame: '#333', monScreen: '#00ff88', monOff: '#1a1a2e',
  chairBack: '#2a2a4a', chairSeat: '#3a3a5a',
  skin: '#ffcc99', skinDark: '#e6b280',
  hair: '#2a2a2a', hairLight: '#3a3a3a',
  plantDark: '#1a6b1a', plantMid: '#228b22', plantLight: '#32cd32',
  potDark: '#6b3410', potLight: '#8b4513',
  windowSky: '#4a90d9', windowLight: '#87ceeb',
  curtain: '#4a3060', curtainLight: '#5a4070',
  carpet: '#2a1a4a', carpetBorder: '#3a2a5a', carpetPattern: '#352050',
  gold: '#ffd700', goldDark: '#cc9900',
  white: '#ffffff', black: '#000000',
  cyan: '#3b82f6', cyanLight: '#60a5fa', cyanDark: '#2563eb',
  red: '#ef4444', green: '#22c55e',
  gray: '#888', grayDark: '#555', grayLight: '#aaa',
};

function drawPixel(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// [Вставить все остальные функции из оригинального файла...]

// Для краткости покажу только важные изменения
function drawCharacter(x, y, shirtColor, hairColor, name) {
  drawPixel(x-1, y+12, 14, 2, 'rgba(0,0,0,0.2)');
  drawPixel(x+2, y+10, 3, 3, P.wallDark);
  drawPixel(x+7, y+10, 3, 3, P.wallDark);
  drawPixel(x+1, y+2, 10, 8, shirtColor);
  drawPixel(x+2, y+2, 8, 1, shirtColor === P.cyan ? P.cyanLight : (shirtColor === P.black ? '#333' : shirtColor));
  drawPixel(x-1, y+3, 2, 6, P.skin);
  drawPixel(x+11, y+3, 2, 6, P.skin);
  drawPixel(x+2, y-6, 8, 8, P.skin);
  drawPixel(x+3, y-5, 6, 6, P.skin);
  
  // NEW: Character-specific styling
  if (name === 'ТРЕЙДЕР') {
    // Длинные седые волосы
    drawPixel(x+1, y-8, 10, 3, '#cccccc');
    drawPixel(x, y-7, 1, 6, '#cccccc');
    drawPixel(x+11, y-7, 1, 6, '#cccccc');
    drawPixel(x-1, y-5, 1, 4, '#cccccc');
    drawPixel(x+12, y-5, 1, 4, '#cccccc');
    
    // Солнцезащитные очки
    drawPixel(x+3, y-4, 6, 3, P.black);
    drawPixel(x+4, y-3, 2, 2, '#111');
    drawPixel(x+7, y-3, 2, 2, '#111');
    drawPixel(x+6, y-3, 1, 1, P.black);
  } else {
    // Рыжие волосы Джонни
    drawPixel(x+2, y-8, 8, 3, '#ff6600');
    drawPixel(x+1, y-7, 1, 4, '#ff6600');
    drawPixel(x+10, y-7, 1, 4, '#ff6600');
    
    // Обычные глаза
    drawPixel(x+4, y-3, 2, 2, P.black);
    drawPixel(x+7, y-3, 2, 2, P.black);
    drawPixel(x+4, y-3, 1, 1, P.white);
    drawPixel(x+7, y-3, 1, 1, P.white);
  }
  
  drawPixel(x+5, y, 3, 1, '#cc8866');
}

// Временно упрощённая функция для демонстрации изменений
function render() {
  drawPixel(0, 0, W, H, P.bg);
  
  // Джонни - чёрная футболка, рыжие волосы
  drawCharacter(61, 79, P.black, '#ff6600', 'ДЖОННИ');
  
  // Трейдер - зелёная футболка, седые волосы, очки  
  drawCharacter(141, 79, P.green, '#cccccc', 'ТРЕЙДЕР');
  
  // Логотип и статус
  ctx.fillStyle = P.cyan;
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('51ASIC OFFICE v' + VERSION, W/2, 30);
  
  ctx.font = '6px monospace';
  ctx.fillText('UPDATED CHARACTER LOOKS!', W/2, 220);
  
  frame++;
  requestAnimationFrame(render);
}

// Клики
canvas.addEventListener('click', (e) => {
  alert('✅ Внешность обновлена!\n\nДжонни: Рыжие волосы + чёрная футболка\nТрейдер: Седые волосы + очки + зелёная рубашка');
});

// Touch поддержка
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const clickEvent = new MouseEvent('click', {
    clientX: touch.clientX,
    clientY: touch.clientY
  });
  canvas.dispatchEvent(clickEvent);
});

// Запуск
render();
</script>
</body>
</html>
